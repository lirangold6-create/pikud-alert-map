<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Live Alert Map — Pikud HaOref</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/public/css/styles.css">
</head>
<body>
  <div id="map"></div>
<div id="map-hint" style="display:none">לחץ פעמיים להתמקדות מחדש</div>
  <div id="panel">
    <div class="panel-header">
      <h1>מפת התרעות חיות</h1>
      <div class="subtitle">Live Alert Map — Pikud HaOref</div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="live">התרעות חיות</button>
      <button class="tab" data-tab="history">היסטוריה</button>
      <button class="tab" data-tab="leaderboard">טבלת מובילים</button>
    </div>

    <div class="tab-content">
      <!-- Live Tab -->
      <div id="tab-live" class="tab-pane active">
        <div id="status"></div>
        <div id="alert-content"></div>
        <div id="refresh-info"></div>
      </div>

      <!-- History Tab -->
      <div id="tab-history" class="tab-pane">
        <div class="search-box">
          <input type="text" id="city-search" placeholder="חפש עיר..." autocomplete="off">
          <div class="city-dropdown" id="city-dropdown"></div>
        </div>
        <div class="time-selector" id="time-selector">
          <button class="time-btn" data-days="1">24 שעות</button>
          <button class="time-btn" data-days="3">3 ימים</button>
          <button class="time-btn active" data-days="7">שבוע</button>
          <button class="time-btn" data-days="30">חודש</button>
        </div>
        <div id="history-content">
          <div class="no-history">בחר עיר כדי לראות היסטוריית התרעות</div>
        </div>
      </div>

      <!-- Leaderboard Tab -->
      <div id="tab-leaderboard" class="tab-pane">
        <div style="font-size: 11px; font-weight: 700; color: #888; margin-bottom: 8px; text-transform: uppercase;">סינון</div>
        <div class="leaderboard-controls">
          <div class="alert-type-toggle">
            <button class="type-toggle-btn active" data-type="red">אזעקות (אדום)</button>
            <button class="type-toggle-btn" data-type="orange">אזהרות (כתום)</button>
          </div>
          <div class="time-selector">
            <button class="lb-time-btn" data-days="1">24 שעות</button>
            <button class="lb-time-btn" data-days="3">3 ימים</button>
            <button class="lb-time-btn active" data-days="7">שבוע</button>
            <button class="lb-time-btn" data-days="30">חודש</button>
          </div>
        </div>
        <div id="leaderboard-content">
          <div class="leaderboard-loading">טוען נתונים...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Conversion detail modal -->
  <div id="conversion-modal-overlay" class="conversion-modal-overlay" onclick="if(event.target===this) closeConversionModal()">
    <div class="conversion-modal" onclick="event.stopPropagation()">
      <div class="conversion-modal-header">
        <span class="conversion-modal-title">פירוט גלים — התרעה מקדימה → אזעקה</span>
        <button class="conversion-modal-close" onclick="closeConversionModal()" aria-label="סגור">×</button>
      </div>
      <div class="conversion-modal-subtitle">תאריך | חיזוי המודל (%) | תוצאה</div>
      <div id="conversion-modal-body" class="conversion-modal-body"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="/public/js/main.js?v=20"></script>
</body>
</html>
