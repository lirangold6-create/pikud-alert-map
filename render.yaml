services:
  # Web Service - HTTP Server
  - type: web
    name: pikud-alert-map
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production

  # Background Worker - Data Collector
  - type: worker
    name: pikud-collector
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: node collector.js
    envVars:
      - key: NODE_ENV
        value: production
